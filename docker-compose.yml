
services:
  postgres:
    image: postgres:15-alpine
    container_name: studio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: studio_admin
      POSTGRES_PASSWORD: studio_password
      POSTGRES_DB: studio_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: